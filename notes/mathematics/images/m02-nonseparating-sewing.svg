<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="340" viewBox="0 0 1000 340" role="img" aria-labelledby="title desc">
  <title id="title">Nonseparating sewing as a self-loop</title>
  <desc id="desc">Two distinguished external legs on one genus g correlator vertex are contracted with the copairing. Sewing them creates a loop edge, raising the total genus from g to g plus one.</desc>
  <style>
    :root { color: #111827; }
    .wire { fill: none; stroke: currentColor; stroke-width: 2.7; stroke-linecap: round; stroke-linejoin: round; }
    .node { fill: #dbeafe; stroke: currentColor; stroke-width: 2.2; }
    .dot { fill: currentColor; }
    .arrow { fill: none; stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrowhead); }
    .label { fill: currentColor; font: 18px ui-sans-serif, system-ui, sans-serif; }
    .small { fill: #4b5563; font: 15px ui-sans-serif, system-ui, sans-serif; }
    .math { fill: currentColor; font: italic 21px Georgia, serif; }
    @media (prefers-color-scheme: dark) {
      :root { color: #e5e7eb; }
      .node { fill: #172554; }
      .small { fill: #cbd5e1; }
      .arrow { stroke: #94a3b8; }
    }
  </style>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="205" y="32" text-anchor="middle" class="label">two legs on the same component</text>
  <circle cx="185" cy="170" r="43" class="node"/>
  <text x="185" y="177" text-anchor="middle" class="math">g</text>
  <path d="M65 170 H142" class="wire"/>
  <circle cx="65" cy="170" r="4.8" class="dot"/>
  <text x="52" y="177" text-anchor="end" class="math">(aₛ)</text>
  <path d="M218 142 L305 102" class="wire"/>
  <path d="M218 198 L305 238" class="wire"/>
  <circle cx="305" cy="102" r="4.8" class="dot"/>
  <circle cx="305" cy="238" r="4.8" class="dot"/>
  <text x="320" y="108" class="math">+</text>
  <text x="320" y="245" class="math">−</text>

  <path d="M390 170 H530" class="arrow"/>
  <text x="460" y="142" text-anchor="middle" class="small">contract with Cη and sew</text>

  <text x="755" y="32" text-anchor="middle" class="label">one self-loop</text>
  <circle cx="690" cy="170" r="43" class="node"/>
  <text x="690" y="177" text-anchor="middle" class="math">g</text>
  <path d="M570 170 H647" class="wire"/>
  <circle cx="570" cy="170" r="4.8" class="dot"/>
  <text x="557" y="177" text-anchor="end" class="math">(aₛ)</text>
  <path d="M722 141 C890 42 935 278 722 199" class="wire"/>
  <text x="857" y="105" text-anchor="middle" class="math">Cη</text>
  <text x="755" y="300" text-anchor="middle" class="math">g + b₁(loop) = g + 1</text>
</svg>
