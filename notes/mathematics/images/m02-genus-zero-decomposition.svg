<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">Feynman diagram for a genus-zero three-point correlator</title>
  <desc id="desc">Three dotted external legs labelled a one, a two, and a three merge at two trivalent junctions. The final undotted end is annihilation by the counit, giving epsilon of a one a two a three.</desc>
  <style>
    :root { color: #111827; }
    .edge { fill: none; stroke: currentColor; stroke-width: 2.7; stroke-linecap: round; stroke-linejoin: round; }
    .external { fill: currentColor; }
    .label { fill: currentColor; font: 18px ui-sans-serif, system-ui, sans-serif; }
    .small { fill: #4b5563; font: 15px ui-sans-serif, system-ui, sans-serif; }
    .math { fill: currentColor; font: italic 21px Georgia, serif; }
    @media (prefers-color-scheme: dark) {
      :root { color: #e5e7eb; }
      .small { fill: #cbd5e1; }
    }
  </style>

  <text x="450" y="29" text-anchor="middle" class="label">genus-zero correlator</text>

  <path d="M90 70 L265 120 L90 170" class="edge"/>
  <path d="M265 120 L485 165 L90 245" class="edge"/>
  <path d="M485 165 H715" class="edge"/>

  <circle cx="90" cy="70" r="4.8" class="external"/>
  <circle cx="90" cy="170" r="4.8" class="external"/>
  <circle cx="90" cy="245" r="4.8" class="external"/>

  <text x="70" y="77" text-anchor="end" class="math">a₁</text>
  <text x="70" y="177" text-anchor="end" class="math">a₂</text>
  <text x="70" y="252" text-anchor="end" class="math">a₃</text>
  <text x="348" y="113" text-anchor="middle" class="math">a₁a₂</text>
  <text x="590" y="151" text-anchor="middle" class="math">a₁a₂a₃</text>

  <text x="450" y="286" text-anchor="middle" class="math">ω₀,{1,2,3}(a₁,a₂,a₃) = ε(a₁a₂a₃)</text>
</svg>
